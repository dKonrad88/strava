<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0f14">
<title>dKonrad Run — Strava</title>
<style>
  :root{
    --bg:#0b0f14; --card:#151c26; --card2:#1b2430; --line:#222d3a;
    --txt:#e8eef6; --mut:#8a98ab; --mut2:#5d6b7d;
    --acc:#fc4c02;            /* laranja Strava */
    --acc2:#2ad4c4; --good:#3ddc84; --warn:#ffc24b; --bad:#ff5d6c; --info:#5aa9ff;
    --grad:linear-gradient(135deg,#fc4c02,#ff8a3d);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{background:#05080c;color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  /* moldura de celular no desktop; tela cheia no mobile */
  .frame{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:0}
  .phone{width:100%;max-width:430px;min-height:100vh;background:var(--bg);position:relative;overflow:hidden}
  @media(min-width:760px){
    body{background:radial-gradient(120% 120% at 50% 0%,#10161e,#05080c)}
    .frame{padding:24px}
    .phone{min-height:0;height:860px;max-height:92vh;border-radius:44px;border:11px solid #0d1219;
      box-shadow:0 30px 80px rgba(0,0,0,.6),inset 0 0 0 2px #1c2531;overflow-y:auto}
    .phone::-webkit-scrollbar{display:none}
    .notch{position:sticky;top:0;height:26px;display:flex;justify-content:center;z-index:60;background:var(--bg)}
    .notch::after{content:"";width:120px;height:20px;background:#0d1219;border-radius:0 0 16px 16px}
  }
  .notch{display:none}
  a{color:var(--acc)}

  header{position:sticky;top:0;z-index:40;background:rgba(11,15,20,.9);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  @media(min-width:760px){header{top:26px}}
  .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .ava{width:38px;height:38px;border-radius:50%;background:var(--card2);object-fit:cover;flex:0 0 auto;border:1px solid var(--line)}
  .brand h1{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand small{display:block;color:var(--mut);font-size:11px}
  .rbtn{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:var(--card);color:var(--txt);
    display:grid;place-items:center;cursor:pointer;flex:0 0 auto}
  .rbtn:active{transform:scale(.94)} .rbtn svg{width:18px;height:18px}
  .spin{animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}

  main{padding:16px 14px 30px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px}
  .card+.card{margin-top:12px}
  .muted{color:var(--mut)} .center{text-align:center}
  .sec{font-size:12px;letter-spacing:.5px;text-transform:uppercase;color:var(--mut);font-weight:700;margin:18px 4px 9px}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 9px;border-radius:999px;border:1px solid var(--line);background:var(--card2)}
  .pill.g{color:var(--good);border-color:rgba(61,220,132,.3)} .pill.b{color:var(--bad);border-color:rgba(255,93,108,.3)}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;border:0;border-radius:13px;
    padding:14px;font-size:14px;font-weight:700;cursor:pointer;color:#fff;background:var(--grad);box-shadow:0 6px 18px rgba(252,76,2,.32)}
  .btn:active{transform:scale(.98)}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--mut);box-shadow:none}
  .btn.sm{width:auto;padding:9px 14px;font-size:12.5px}

  input{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:13px;
    color:var(--txt);font-size:14px;margin-top:8px}
  input:focus{outline:none;border-color:var(--acc)}

  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 10px}
  .kpi .v{font-size:18px;font-weight:800} .kpi .l{font-size:10.5px;color:var(--mut);margin-top:3px}

  .act{display:flex;align-items:center;gap:12px;padding:11px 13px;background:var(--card);border:1px solid var(--line);border-radius:13px}
  .act+.act{margin-top:8px}
  .ic{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:16px;flex:0 0 auto}
  .ic.run{background:rgba(252,76,2,.13)} .ic.gym{background:rgba(90,169,255,.13)} .ic.ride{background:rgba(61,220,132,.13)} .ic.other{background:rgba(138,152,171,.13)}
  .act .m{flex:1;min-width:0} .act .t{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .act .s{font-size:11px;color:var(--mut);margin-top:2px}
  .act .r{text-align:right;flex:0 0 auto} .act .r .p{font-size:13.5px;font-weight:800} .act .r .p2{font-size:10px;color:var(--mut);margin-top:1px}

  .bars{display:flex;align-items:flex-end;gap:5px;height:64px;margin-top:6px}
  .bars i{flex:1;background:var(--card2);border-radius:4px 4px 0 0;min-height:3px}
  .bars i.on{background:var(--grad)}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--card2);
    border:1px solid var(--line);padding:11px 16px;border-radius:12px;font-size:13px;font-weight:600;opacity:0;
    pointer-events:none;transition:.3s;z-index:90;max-width:86%;box-shadow:0 10px 30px rgba(0,0,0,.5)}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .hide{display:none!important}
  .spinbig{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;margin:24px auto}
  .logo{width:54px;height:54px;border-radius:15px;background:var(--grad);display:grid;place-items:center;font-weight:800;color:#fff;font-size:22px;margin:0 auto 14px;box-shadow:0 8px 22px rgba(252,76,2,.35)}
  .foot{text-align:center;color:var(--mut2);font-size:10.5px;margin-top:22px;line-height:1.6}
</style>
</head>
<body>
<div class="frame"><div class="phone">
  <div class="notch"></div>

  <!-- ===== LOADING ===== -->
  <div id="v-load"><div class="spinbig"></div><p class="center muted" style="font-size:13px">Carregando…</p></div>

  <!-- ===== LOGIN ===== -->
  <div id="v-login" class="hide">
    <main style="padding-top:60px">
      <div class="logo">dK</div>
      <h1 class="center" style="font-size:20px;font-weight:800">dKonrad Run</h1>
      <p class="center muted" style="font-size:13px;margin-top:5px">Conector & painel do Strava</p>
      <div class="card" style="margin-top:26px">
        <input id="email" type="email" placeholder="E-mail" autocomplete="email">
        <input id="pass" type="password" placeholder="Senha" autocomplete="current-password">
        <button class="btn" id="loginBtn" style="margin-top:14px">Entrar</button>
        <p class="center muted" style="font-size:11.5px;margin-top:12px">Mesmo login do seu HUB pessoal.</p>
        <p id="loginErr" class="center" style="color:var(--bad);font-size:12px;margin-top:8px"></p>
      </div>
    </main>
  </div>

  <!-- ===== APP ===== -->
  <div id="v-app" class="hide">
    <header>
      <div class="brand">
        <img id="hAva" class="ava" alt="">
        <div><h1 id="hName">—</h1><small id="hSync">—</small></div>
      </div>
      <button class="rbtn" id="syncBtn" title="Sincronizar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
      </button>
    </header>
    <main id="appBody"></main>
  </div>

  <div class="toast" id="toast"></div>
</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ===================== CONFIG ===================== */
const SUPA_URL = 'https://jlouesrrmqeauzlgvrpw.supabase.co';
const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impsb3Vlc3JybXFlYXV6bGd2cnB3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMDg1MjYsImV4cCI6MjA5NjY4NDUyNn0.hRgHOpPR8KBPHqBGXGXVPmNv01tCRmOPfB3Qk6pF6eI';
const STRAVA_CID = '261805';
const REDIRECT = 'https://dkonrad88.github.io/strava/';
const FN = SUPA_URL + '/functions/v1/strava-sync';
const SCOPE = 'read,activity:read_all,profile:read_all';
const AUTH_URL = `https://www.strava.com/oauth/authorize?client_id=${STRAVA_CID}&response_type=code&redirect_uri=${encodeURIComponent(REDIRECT)}&approval_prompt=auto&scope=${SCOPE}`;

const sb = window.supabase.createClient(SUPA_URL, SUPA_ANON);

/* ===================== HELPERS ===================== */
const $ = id => document.getElementById(id);
const pad = n => String(n).padStart(2,'0');
const MES = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
function show(v){ ['v-load','v-login','v-app'].forEach(x=>$(x).classList.toggle('hide',x!==v)); }
function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('on'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('on'),2600); }
function pace(sk){ if(sk==null) return '—'; const m=Math.floor(sk/60),s=Math.round(sk%60); return m+':'+pad(s); }
function clock(sec){ sec=Math.round(sec||0); const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60); return h?h+'h'+pad(m):m+'min'; }
function ago(iso){ if(!iso) return '—'; const d=(Date.now()-new Date(iso))/1000;
  if(d<90) return 'agora há pouco'; if(d<3600) return Math.floor(d/60)+' min atrás';
  if(d<86400) return Math.floor(d/3600)+'h atrás'; return Math.floor(d/86400)+'d atrás'; }
function actIcon(t){ if(t==='Run'||t==='TrailRun'||t==='VirtualRun') return ['run','🏃'];
  if(t==='WeightTraining'||t==='Workout') return ['gym','🏋️']; if(t==='Ride'||t==='VirtualRide') return ['ride','🚴']; return ['other','📍']; }

async function callFn(action, extra={}){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session) throw new Error('no_session');
  const r = await fetch(FN, { method:'POST',
    headers:{ 'Content-Type':'application/json', 'apikey':SUPA_ANON, 'Authorization':'Bearer '+session.access_token },
    body: JSON.stringify({ action, ...extra }) });
  return r.json();
}
async function loadState(){
  const { data } = await sb.from('strava_state').select('key,value');
  const m={}; (data||[]).forEach(r=>m[r.key]=r.value); return m;
}

/* ===================== RENDER ===================== */
function renderConnect(){
  $('appBody').innerHTML = `
    <div class="card center" style="margin-top:30px">
      <div class="logo" style="background:var(--grad)">S</div>
      <h2 style="font-size:17px;font-weight:800">Conecte seu Strava</h2>
      <p class="muted" style="font-size:13px;margin:8px 0 16px;line-height:1.5">Autorize uma vez e suas corridas e treinos passam a sincronizar automaticamente neste painel.</p>
      <button class="btn" id="connectBtn">Conectar com o Strava</button>
      <p class="muted" style="font-size:11px;margin-top:12px">Seguro: a senha da API fica no servidor (Supabase), nunca aqui.</p>
    </div>`;
  $('connectBtn').onclick = ()=>{ location.href = AUTH_URL; };
}

function renderDash(st){
  const ath = st.athlete||{}, tot = st.totals||{}, acts = (st.activities&&st.activities.items)||[];
  const wk = tot.week||{}, mo = tot.month||{}, yt = tot.ytd||{};
  $('hName').textContent = ath.name || 'Atleta';
  $('hSync').textContent = 'sincronizado '+ago(st.meta&&st.meta.last_sync);
  if(ath.profile_pic){ $('hAva').src = ath.profile_pic; } else { $('hAva').style.background='var(--card2)'; }

  // mini gráfico: volume por dia (últimos 14 dias) das corridas
  const days=[]; const today=new Date(); today.setHours(0,0,0,0);
  for(let i=13;i>=0;i--){ const d=new Date(today); d.setDate(d.getDate()-i); days.push({d,km:0}); }
  acts.forEach(a=>{ const ad=new Date(a.start); ad.setHours(0,0,0,0);
    const slot=days.find(x=>x.d.getTime()===ad.getTime()); if(slot) slot.km+=(a.distance_m||0)/1000; });
  const mx=Math.max(0.1,...days.map(d=>d.km));
  const bars=days.map(d=>`<i class="${d.km>0?'on':''}" style="height:${Math.max(3,d.km/mx*100)}%" title="${d.km.toFixed(1)}km"></i>`).join('');

  const recent = acts.slice(0,12).map(a=>{
    const [cls,emo]=actIcon(a.type);
    const main = a.type==='WeightTraining'? clock(a.moving_s) : ((a.distance_m/1000).toFixed(2)+' km');
    const right = a.pace_s_per_km? `<div class="p">${pace(a.pace_s_per_km)}</div><div class="p2">/km${a.avg_hr?' · '+Math.round(a.avg_hr)+'bpm':''}</div>`
      : `<div class="p2">esforço ${a.relative_effort??'—'}</div>`;
    const dd=new Date(a.start);
    return `<div class="act"><div class="ic ${cls}">${emo}</div>
      <div class="m"><div class="t">${a.name||a.type}</div><div class="s">${pad(dd.getDate())} ${MES[dd.getMonth()]} · ${main}${a.indoor?' · indoor':''}</div></div>
      <div class="r">${right}</div></div>`;
  }).join('');

  $('appBody').innerHTML = `
    <div class="sec">Esta semana</div>
    <div class="kpis">
      <div class="kpi"><div class="v">${(wk.distance_km||0).toFixed(1)}<small style="font-size:11px;color:var(--mut)">km</small></div><div class="l">Distância</div></div>
      <div class="kpi"><div class="v">${wk.runs||0}</div><div class="l">Corridas</div></div>
      <div class="kpi"><div class="v">${clock(wk.time_s)}</div><div class="l">Tempo</div></div>
    </div>

    <div class="card" style="margin-top:12px">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <strong style="font-size:13px">Volume · 14 dias</strong>
        <span class="muted" style="font-size:11px">mês: ${(mo.distance_km||0).toFixed(0)} km · ano: ${(yt.distance_km||0).toFixed(0)} km</span>
      </div>
      <div class="bars">${bars}</div>
    </div>

    <div class="sec">Atividades recentes</div>
    ${recent || '<p class="muted center" style="font-size:13px;padding:20px">Nenhuma atividade ainda.</p>'}

    <div style="margin-top:16px"><button class="btn ghost sm" id="discBtn" style="width:100%">Desconectar Strava</button></div>
    <div class="foot">${(st.activities&&st.activities.count)||0} atividades sincronizadas.<br>Atualiza ao abrir o app e no botão ↻.</div>`;

  $('discBtn').onclick = async ()=>{
    if(!confirm('Desconectar o Strava deste painel?')) return;
    await callFn('disconnect'); toast('Strava desconectado'); boot();
  };
}

/* ===================== FLOW ===================== */
async function refresh(showToast){
  const ic = $('syncBtn').querySelector('svg'); ic.classList.add('spin');
  try{
    const res = await callFn('sync');
    if(res && res.connected===false){ renderConnect(); return; }
    const st = await loadState(); renderDash(st);
    if(showToast) toast('Sincronizado · '+((res&&res.count)||0)+' atividades');
  }catch(e){ toast('Erro ao sincronizar'); }
  finally{ ic.classList.remove('spin'); }
}

async function enterApp(){
  show('v-app');
  // 1) trata retorno do OAuth (?code=...)
  const u = new URL(location.href);
  const code = u.searchParams.get('code');
  if(code){
    const scope = u.searchParams.get('scope')||SCOPE;
    history.replaceState({}, '', REDIRECT);     // limpa a URL
    $('appBody').innerHTML = '<div class="spinbig"></div><p class="center muted" style="font-size:13px">Conectando ao Strava…</p>';
    try{ const r = await callFn('exchange',{code,scope});
      if(r.error){ toast('Falha ao conectar'); }
    }catch(e){ toast('Falha ao conectar'); }
  }
  // 2) carrega estado
  const st = await loadState();
  if(st.meta && st.meta.connected){ renderDash(st); refresh(false); }
  else if(Object.keys(st).length && st.activities){ renderDash(st); }
  else { renderConnect(); }
}

async function boot(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session){ enterApp(); } else { show('v-login'); }
}

/* login */
$('loginBtn').onclick = async ()=>{
  $('loginErr').textContent='';
  const email=$('email').value.trim(), password=$('pass').value;
  if(!email||!password){ $('loginErr').textContent='Preencha e-mail e senha.'; return; }
  $('loginBtn').textContent='Entrando…';
  const { error } = await sb.auth.signInWithPassword({ email, password });
  $('loginBtn').textContent='Entrar';
  if(error){ $('loginErr').textContent='E-mail ou senha inválidos.'; return; }
  enterApp();
};
$('pass').addEventListener('keydown', e=>{ if(e.key==='Enter') $('loginBtn').click(); });
$('syncBtn').onclick = ()=>refresh(true);

sb.auth.onAuthStateChange((_e,s)=>{ /* sessão compartilhada entre apps da mesma origin */ });
boot();
</script>
</body>
</html>
